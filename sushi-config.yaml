id: be.fhir.bcr
canonical: https://www.ehealth.fgov.be/standards/fhir/registries/bcr
name: BCR
title: Belgian Cancer Registry on FHIR
description: FHIR Implementation Guide for the Belgian Cancer Registry (BCR).
status: draft
version: 0.1.0
fhirVersion: 5.0.0
copyrightYear: 2026+
releaseLabel: ci-build
license: CC0-1.0
jurisdiction: urn:iso:std:iso:3166#BE "Belgium"

publisher:
  name: eHealth Platform Belgium
  url: https://www.ehealth.fgov.be
  email: info@ehealth.fgov.be

dependencies:
  hl7.fhir.uv.extensions.r5: 5.2.0
  # SDC has no FHIR R5 release; the R4 package is loaded cross-version so the
  # extraction/population extension definitions (and the questionnaire-item-control
  # `tab` code) resolve. See TIRO_INTEGRATION.md.
  hl7.fhir.uv.sdc: 4.0.0

parameters:
  apply-publisher: true
  apply-jurisdiction: true
  apply-version: true
  show-inherited-invariants: false

# Form-tab pages for every Questionnaire are generated by the IG Publisher
# from layout-questionnaire-form.html in the Tiro template (#tiro-template).
# See TIRO_INTEGRATION.md.
pages:
  index.md:
    title: Home
  background.md:
    title: Background
  dataflow.md:
    title: Data flow
  models.md:
    title: Models
  terminology.md:
    title: Terminology
  downloads.md:
    title: Downloads

menu:
  Home: index.html
  Background: background.html
  Data flow: dataflow.html
  Models: models.html
  Terminology: terminology.html
  Artifacts: artifacts.html
  Downloads: downloads.html

# Define FHIR Shorthand FSH-only project? Set false to keep IG generation enabled.
FSHOnly: false
applyExtensionMetadataToRoot: true
